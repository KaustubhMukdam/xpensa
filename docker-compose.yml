version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Optional local Redis — only needed if you want in-process cache as a service
  # For hackathon, we'll use cachetools (in-process) instead — no Redis needed
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"